name: Draft Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: ""
